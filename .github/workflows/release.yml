name: Release

on:
  push:
    tags:
      - "v*-endalk.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.59.0-endalk.1)"
        required: true
        type: string
      ref:
        description: "Ref to release from (branch, commit SHA, or tag)"
        required: false
        default: "master"
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Validate release tag format
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-endalk\.[0-9]+$ ]]; then
            echo "Invalid tag '${RELEASE_TAG}'. Expected: vX.Y.Z-endalk.N"
            exit 1
          fi

      - name: Ensure tag exists for workflow dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags
          if git rev-parse --verify "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}" -a -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Check docs and schema are in sync
        run: |
          if diff -r -q docs docs-master >/dev/null && diff -r -q schema schema-master >/dev/null; then
            echo "Docs and schema are up to date."
          else
            echo "Docs/schema mismatch detected. Run scripts/update_docs_for_release.sh and commit the results."
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
